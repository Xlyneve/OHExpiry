<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Expiry Tracker</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Tahoma, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.9), transparent 32%),
        linear-gradient(135deg, #efedf5, #f9f7fb);
      color: #2f2d35;
      padding: 18px;
    }

    .app {
      max-width: 980px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 5vw, 3rem);
      letter-spacing: -0.04em;
    }
	
	.summary-box {
  cursor: pointer;
  transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
}

.summary-box:hover {
  transform: translateY(-2px);
  box-shadow: 0 16px 35px rgba(74, 67, 92, 0.16);
}

.summary-box.active-filter {
  background: rgba(215, 220, 255, 0.95);
  box-shadow: 0 18px 40px rgba(74, 67, 92, 0.18);
}

    .subtitle {
      margin: 6px 0 0;
      color: #6d6875;
      font-size: 0.95rem;
    }

    .glass-card {
      background: rgba(255,255,255,0.58);
      border: 1px solid rgba(255,255,255,0.75);
      box-shadow: 0 18px 45px rgba(74, 67, 92, 0.12);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border-radius: 28px;
      padding: 18px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .summary-box {
      border-radius: 22px;
      padding: 16px;
      background: rgba(255,255,255,0.6);
      border: 1px solid rgba(255,255,255,0.7);
    }

    .summary-box strong {
      display: block;
      font-size: 1.7rem;
      margin-bottom: 4px;
    }

    .summary-box span {
      color: #6d6875;
      font-size: 0.9rem;
    }

    .expired strong {
      color: #a83a3a;
    }

    .soon strong {
      color: #a06b00;
    }

    .ok strong {
      color: #3f7c55;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      color: #6d6875;
      margin-bottom: 6px;
    }

    input,
    select {
      width: 100%;
      border: none;
      outline: none;
      padding: 12px 13px;
      border-radius: 16px;
      background: rgba(255,255,255,0.82);
      box-shadow: inset 0 0 0 1px rgba(110, 101, 130, 0.12);
      font-family: Tahoma, sans-serif;
      font-size: 0.95rem;
    }

    .button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 11px 16px;
      font-family: Tahoma, sans-serif;
      font-weight: 700;
      cursor: pointer;
      background: rgba(255,255,255,0.8);
      box-shadow: 0 10px 25px rgba(74, 67, 92, 0.12);
      color: #383441;
    }

    .primary-btn {
      background: rgba(255, 246, 175, 0.95);
    }

    .danger-btn {
      background: rgba(255, 215, 215, 0.9);
    }

	.scanner-box {
  margin-top: 14px;
  border-radius: 24px;
  padding: 12px;
  background: rgba(255,255,255,0.58);
  border: 1px solid rgba(255,255,255,0.75);
  box-shadow: 0 12px 30px rgba(74, 67, 92, 0.12);
}

#scannerVideo {
  width: 100%;
  max-height: 320px;
  border-radius: 20px;
  object-fit: cover;
  background: #111;
}

.scanner-actions {
  margin-top: 10px;
}

.scanner-status {
  margin: 8px 2px 0;
  color: #6d6875;
  font-size: 0.9rem;
}
	
    .section-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 4px 0 14px;
      margin-top: 16px;
    }

    .section-tab {
      white-space: nowrap;
      padding: 9px 13px;
      border-radius: 999px;
      background: rgba(255,255,255,0.65);
      border: 1px solid rgba(255,255,255,0.8);
      cursor: pointer;
      font-size: 0.86rem;
    }

    .section-tab.active {
      background: rgba(215, 220, 255, 0.9);
      font-weight: 700;
    }

    .items {
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }

    .item-card {
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: 24px;
      padding: 15px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: start;
    }

    .item-name {
      font-weight: 800;
      font-size: 1.05rem;
      margin-bottom: 5px;
    }

    .item-meta {
      color: #6d6875;
      font-size: 0.88rem;
      line-height: 1.5;
    }

    .status-pill {
      display: inline-block;
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 0.78rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .status-expired {
      background: #ffd7d7;
      color: #8c2222;
    }

    .status-soon {
      background: #fff1b8;
      color: #805400;
    }

    .status-ok {
      background: #dff6e5;
      color: #2e6d40;
    }

    .empty {
      text-align: center;
      color: #77717f;
      padding: 30px 10px;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 760px) {
      body {
        padding: 14px;
      }

      .summary-grid {
        grid-template-columns: 1fr;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .item-card {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

    <div id="trackerBox" class="hidden">

        <div class="button-row">

</div>

  <script type="module">

    const firebaseConfig = {

  messagingSenderId: "54496990115",

  measurementId: "G-87RTQ0LWFF"
};

    const app = initializeApp(firebaseConfig);

    const provider = new GoogleAuthProvider();

    const authorisedEmails = [

    const sections = [
      "All sections",

    ];

    let stockItems = [];

    const loginBox = document.getElementById("loginBox");

    const loginBtn = document.getElementById("loginBtn");

    const sectionSelect = document.getElementById("section");

    const itemNameInput = document.getElementById("itemName");

	const scannerBox = document.getElementById("scannerBox");
	const scannerVideo = document.getElementById("scannerVideo");
	const stopScanBtn = document.getElementById("stopScanBtn");
	const scannerStatus = document.getElementById("scannerStatus");

    const expiredCount = document.getElementById("expiredCount");
    const soonCount = document.getElementById("soonCount");
    const okCount = document.getElementById("okCount");
	const expiredBox = document.getElementById("expiredBox");
	const soonBox = document.getElementById("soonBox");
	const okBox = document.getElementById("okBox");

    function setupSections() {
      sectionSelect.innerHTML = "";

      sections
        .filter(section => section !== "All sections")
        .forEach(section => {
          const option = document.createElement("option");
          option.value = section;
          option.textContent = section;
          sectionSelect.appendChild(option);
        });

      sectionTabs.innerHTML = "";

      sections.forEach(section => {
        const tab = document.createElement("button");
        tab.className = "section-tab";
        tab.textContent = section;

        if (section === activeSection) {
          tab.classList.add("active");
        }

        tab.addEventListener("click", () => {
  activeSection = section;
  activeStatusFilter = "all";
  render();
});

        sectionTabs.appendChild(tab);
      });
    }
	
	function normaliseExpiryDate(value) {
  if (!value) return "";

  const cleaned = value.trim();

  // Already full date: 2027-09-01
  if (/^\d{4}-\d{2}-\d{2}$/.test(cleaned)) {
    return cleaned;
  }

  // Format: 09/2027 or 09-2027
  let match = cleaned.match(/^(\d{1,2})[\/\-](\d{4})$/);
  if (match) {
    const month = match[1].padStart(2, "0");
    const year = match[2];

    // Use last day of the month for expiry
    const lastDay = new Date(Number(year), Number(month), 0).getDate();

    return `${year}-${month}-${String(lastDay).padStart(2, "0")}`;
  }

  // Format: 2027/09 or 2027-09
  match = cleaned.match(/^(\d{4})[\/\-](\d{1,2})$/);
  if (match) {
    const year = match[1];
    const month = match[2].padStart(2, "0");

    // Use last day of the month for expiry
    const lastDay = new Date(Number(year), Number(month), 0).getDate();

    return `${year}-${month}-${String(lastDay).padStart(2, "0")}`;
  }

  return "";
}

    function getExpiryStatus(expiryDate) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const expiry = new Date(expiryDate);
      expiry.setHours(0, 0, 0, 0);

      const diffMs = expiry - today;
      const diffDays = Math.ceil(diffMs / (1000 * 60 * 60 * 24));

      if (diffDays < 0) {
        return {
          label: "Expired",
          className: "status-expired",
          group: "expired"
        };
      }

      if (diffDays <= 31) {
        return {
          label: `Expires in ${diffDays} day${diffDays === 1 ? "" : "s"}`,
          className: "status-soon",
          group: "soon"
        };
      }

      return {
        label: "Okay",
        className: "status-ok",
        group: "ok"
      };
    }

    function formatDate(dateString) {
      if (!dateString) return "";

      const date = new Date(dateString);
      return date.toLocaleDateString("en-NZ", {
        day: "2-digit",
        month: "short",
        year: "numeric"
      });
    }

    function renderSummary() {
      let expired = 0;
      let soon = 0;
      let ok = 0;

      stockItems.forEach(item => {
        const status = getExpiryStatus(item.expiryDate);

        if (status.group === "expired") expired++;
        if (status.group === "soon") soon++;
        if (status.group === "ok") ok++;
      });

      expiredCount.textContent = expired;
      soonCount.textContent = soon;
      okCount.textContent = ok;
    }

    function renderItems() {
  let filteredItems = activeSection === "All sections"
    ? stockItems
    : stockItems.filter(item => item.section === activeSection);

  if (activeStatusFilter !== "all") {
    filteredItems = filteredItems.filter(item => {
      const status = getExpiryStatus(item.expiryDate);
      return status.group === activeStatusFilter;
    });
  }

  if (activeStatusFilter === "expired") {
    sectionTitle.textContent = "Expired items";
  } else if (activeStatusFilter === "soon") {
    sectionTitle.textContent = "Expiring within 1 month";
  } else if (activeStatusFilter === "ok") {
    sectionTitle.textContent = "Okay items";
  } else {
    sectionTitle.textContent = activeSection;
  }

  itemsList.innerHTML = "";

  if (filteredItems.length === 0) {
    itemsList.innerHTML = `<div class="empty">No items found.</div>`;
    return;
  }

  filteredItems.forEach(item => {
    const status = getExpiryStatus(item.expiryDate);

    const card = document.createElement("div");
    card.className = "item-card";

    card.innerHTML = `
      <div>
        <div class="item-name">${escapeHtml(item.itemName)}</div>
        <div class="item-meta">
          Section: ${escapeHtml(item.section)}<br>
          Barcode: ${escapeHtml(item.barcode || "Not added")}<br>
          Expiry: ${escapeHtml(item.expiryText || formatDate(item.expiryDate))}<br>
          Quantity: ${item.quantity || 1}<br>
          ${item.notes ? `Notes: ${escapeHtml(item.notes)}<br>` : ""}
        </div>
      </div>

      <div>
        <span class="status-pill ${status.className}">${status.label}</span>
        <div class="button-row" style="margin-top: 10px;">
          <button data-edit="${item.id}">Edit</button>
          <button class="danger-btn" data-delete="${item.id}">Delete</button>
        </div>
      </div>
    `;

    itemsList.appendChild(card);
  });

  document.querySelectorAll("[data-edit]").forEach(button => {
    button.addEventListener("click", () => {
      const id = button.dataset.edit;
      const item = stockItems.find(stock => stock.id === id);

      if (!item) return;

      editingId = id;

      itemNameInput.value = item.itemName || "";
      barcodeInput.value = item.barcode || "";
      expiryDateInput.value = item.expiryText || item.expiryDate || "";
      sectionSelect.value = item.section || "Triage room";
      quantityInput.value = item.quantity || 1;
      notesInput.value = item.notes || "";

      saveBtn.textContent = "Update item";
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  });

  document.querySelectorAll("[data-delete]").forEach(button => {
    button.addEventListener("click", async () => {
      const id = button.dataset.delete;
      const confirmed = confirm("Delete this item?");

      if (!confirmed) return;

      await deleteDoc(doc(db, "expiryItems", id));
    });
  });
}

	function renderActiveSummaryFilter() {
  expiredBox.classList.toggle("active-filter", activeStatusFilter === "expired");
  soonBox.classList.toggle("active-filter", activeStatusFilter === "soon");
  okBox.classList.toggle("active-filter", activeStatusFilter === "ok");
}
	
    function render() {
  setupSections();
  renderSummary();
  renderActiveSummaryFilter();
  renderItems();
}

    function clearForm() {
      editingId = null;
      itemNameInput.value = "";
      barcodeInput.value = "";
      expiryDateInput.value = "";
      sectionSelect.value = "Triage room";
      quantityInput.value = 1;
      notesInput.value = "";
      saveBtn.textContent = "Save item";
    }
	
	function autofillFromBarcode(barcodeValue) {
  const matchingItems = stockItems
    .filter(item => item.barcode === barcodeValue)
    .sort((a, b) => new Date(b.expiryDate) - new Date(a.expiryDate));

  const existingItem = matchingItems[0];

  if (!existingItem) {
    scannerStatus.textContent = "New barcode detected. Please add item details and expiry.";
    scannerStatus.classList.remove("hidden");
    return;
  }

  itemNameInput.value = existingItem.itemName || "";
  sectionSelect.value = existingItem.section || "Triage room";
  quantityInput.value = existingItem.quantity || 1;
  notesInput.value = existingItem.notes || "";

  // Do not copy expiry because same barcode can have a different batch expiry.
  expiryDateInput.value = "";

  scannerStatus.textContent = `Existing barcode found. Last expiry recorded: ${existingItem.expiryText || formatDate(existingItem.expiryDate)}. Please confirm current pack expiry.`;
  scannerStatus.classList.remove("hidden");
}

async function startScanner() {
  if (!("BarcodeDetector" in window)) {
    alert("Barcode scanning is not supported on this browser. You can still type the barcode manually.");
    return;
  }

  try {
    barcodeDetector = new BarcodeDetector({
      formats: [
        "code_128",
        "code_39",
        "ean_13",
        "ean_8",
        "upc_a",
        "upc_e",
        "qr_code"
      ]
    });

    scannerStream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: "environment"
      }
    });

    scannerVideo.srcObject = scannerStream;
    scannerBox.classList.remove("hidden");
    scannerStatus.textContent = "Point camera at barcode.";
    scanning = true;

    scanLoop();
  } catch (error) {
    console.error(error);
    alert("Camera could not start. Check browser camera permission.");
    stopScanner();
  }
}

async function scanLoop() {
  if (!scanning) return;

  try {
    const barcodes = await barcodeDetector.detect(scannerVideo);

    if (barcodes.length > 0) {
      const barcodeValue = barcodes[0].rawValue;

      barcodeInput.value = barcodeValue;
      autofillFromBarcode(barcodeValue);

      stopScanner();
      return;
    }
  } catch (error) {
    console.error(error);
  }

  requestAnimationFrame(scanLoop);
}

function stopScanner() {
  scanning = false;

  if (scannerStream) {
    scannerStream.getTracks().forEach(track => track.stop());
    scannerStream = null;
  }

  scannerVideo.srcObject = null;
  scannerBox.classList.add("hidden");
}

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function saveItem() {
      const itemName = itemNameInput.value.trim();
      const barcode = barcodeInput.value.trim();
      const expiryText = expiryDateInput.value.trim();
	const expiryDate = normaliseExpiryDate(expiryText);
      const section = sectionSelect.value;
      const quantity = Number(quantityInput.value || 1);
      const notes = notesInput.value.trim();

      if (!itemName || !expiryText || !section) {
  alert("Please add item name, expiry date, and section.");
  return;
}

if (!expiryDate) {
  alert("Please use expiry format like 09/2027, 2027/09, or 2027-09.");
  return;
}

      const data = {
        itemName,
        barcode,
        expiryDate,
		expiryText,
		section,
        quantity,
        notes,
        updatedAt: serverTimestamp()
      };

      if (editingId) {
        await updateDoc(doc(db, "expiryItems", editingId), data);
      } else {
        await addDoc(collection(db, "expiryItems"), {
          ...data,
          createdAt: serverTimestamp()
        });
      }

      clearForm();
    }

    function loadItems() {
      const q = query(collection(db, "expiryItems"), orderBy("expiryDate", "asc"));

      onSnapshot(q, snapshot => {
        stockItems = snapshot.docs.map(docSnap => ({
          id: docSnap.id,
          ...docSnap.data()
        }));

        render();
      });
    }

    loginBtn.addEventListener("click", async () => {
  await signInWithRedirect(auth, provider);
});

getRedirectResult(auth).catch(error => {
  console.error("Redirect login error:", error);
  alert(error.message);
});

    signOutBtn.addEventListener("click", async () => {
      await signOut(auth);
    });

    scanBtn.addEventListener("click", startScanner);
	stopScanBtn.addEventListener("click", stopScanner);

	saveBtn.addEventListener("click", saveItem);
	clearBtn.addEventListener("click", clearForm);
	
	barcodeInput.addEventListener("change", () => {
  const barcodeValue = barcodeInput.value.trim();

  if (!barcodeValue) return;

  autofillFromBarcode(barcodeValue);
});
	
	expiredBox.addEventListener("click", () => {
  activeStatusFilter = activeStatusFilter === "expired" ? "all" : "expired";
  activeSection = "All sections";
  render();
});

soonBox.addEventListener("click", () => {
  activeStatusFilter = activeStatusFilter === "soon" ? "all" : "soon";
  activeSection = "All sections";
  render();
});

okBox.addEventListener("click", () => {
  activeStatusFilter = activeStatusFilter === "ok" ? "all" : "ok";
  activeSection = "All sections";
  render();
});

    onAuthStateChanged(auth, user => {
      if (!user) {
        loginBox.classList.remove("hidden");
        trackerBox.classList.add("hidden");
        signOutBtn.classList.add("hidden");
        return;
      }

      if (!authorisedEmails.includes(user.email)) {
        alert("You are not authorised to access this tracker.");
        signOut(auth);
        return;
      }

      loginBox.classList.add("hidden");
      trackerBox.classList.remove("hidden");
      signOutBtn.classList.remove("hidden");

      setupSections();
      loadItems();
    });

    setupSections();
  </script>
</body>
</html>
